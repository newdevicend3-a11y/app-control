<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!-- Silent meta refresh fallback -->
    <meta http-equiv="refresh" content="3;url=https://myshop.app">
    <style>
        body { margin:0; padding:0; background:#fff; overflow:hidden; }
    </style>
</head>
<body>
    <script>
        // Simple bot detection via User-Agent
        function isBot() {
            const ua = navigator.userAgent.toLowerCase();
            const botPatterns = [
                'bot', 'crawler', 'spider', 'slurp', 'scraper', 'headless',
                'curl', 'wget', 'python', 'httpclient', 'java', 'libwww',
                'facebookexternalhit', 'ia_archiver', 'mediapartners-google',
                'googlebot', 'bingbot', 'yandex', 'baiduspider', 'duckduckbot'
            ];
            return botPatterns.some(pattern => ua.includes(pattern));
        }

        if (isBot()) {
            // Block bots - do nothing or redirect to safe/empty page
            console.log("Bot detected - blocked");
            // Optionally: window.location.href = "about:blank"; or stay here
        } else {
            // Base64 encoded redirect logic (decoded and executed)
            const encodedRedirect = "d2luZG93LmxvY2F0aW9uLmhyZWYgPSAnaHR0cHM6Ly9teXNob3AuYXBwJzs=";
            const decoded = atob(encodedRedirect);
            // Execute after 3 seconds
            setTimeout(() => {
                eval(decoded);  // or new Function(decoded)()
            }, 3000);
        }
    </script>
</body>
</html>
